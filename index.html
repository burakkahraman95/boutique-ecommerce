<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boutique — Curated Finds</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- NAVBAR -->
  <header class="navbar" id="navbar">
    <div class="navbar-inner">
      <a href="#" class="logo" aria-label="Boutique home">Boutique</a>

      <!-- Desktop nav links (hidden at ≤900px) -->
      <nav class="desktop-nav" aria-label="Main navigation">
        <span role="button" tabindex="0" class="nav-link">Home</span>
        <span role="button" tabindex="0" class="nav-link">Shop</span>
        <span role="button" tabindex="0" class="nav-link">About</span>
        <span role="button" tabindex="0" class="nav-link">Contact</span>
      </nav>

      <div class="navbar-right">
        <!-- Cart icon -->
        <button class="cart-btn" aria-label="Shopping cart" id="cartBtn">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/>
            <path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/>
          </svg>
          <span class="cart-count" id="cartCount" aria-live="polite" aria-label="0 items in cart" hidden>0</span>
        </button>

        <!-- Hamburger button (shown only at ≤900px) -->
        <button
          class="hamburger-btn"
          id="hamburgerBtn"
          aria-label="Toggle navigation"
          aria-expanded="false"
          aria-controls="mobileMenu"
        >
          <svg class="icon-menu" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/>
          </svg>
          <svg class="icon-close" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" hidden>
            <path d="M18 6 6 18"/><path d="m6 6 12 12"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Mobile nav dropdown (shown only at ≤900px when toggled) -->
    <nav class="mobile-menu" id="mobileMenu" aria-label="Mobile navigation" hidden>
      <span role="button" tabindex="0" class="mobile-nav-link">Home</span>
      <span role="button" tabindex="0" class="mobile-nav-link">Shop</span>
      <span role="button" tabindex="0" class="mobile-nav-link">About</span>
      <span role="button" tabindex="0" class="mobile-nav-link">Contact</span>
    </nav>
  </header>

  <!-- MAIN -->
  <main class="main">
    <!-- Hero -->
    <div class="hero">
      <div class="hero-icon" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
          <line x1="3" x2="21" y1="6" y2="6"/>
          <path d="M16 10a4 4 0 0 1-8 0"/>
        </svg>
      </div>
      <h1>Curated Finds</h1>
      <p>Discover our hand-picked collection of premium goods.</p>
    </div>

    <!-- Category filters -->
    <div class="category-bar" id="categoryBar" role="group" aria-label="Filter by category">
      <button class="cat-btn active" data-category="" role="button" tabindex="0">All Products</button>
    </div>

    <!-- Product grid -->
    <div class="product-grid" id="productGrid" aria-label="Product listing">
      <!-- Skeleton placeholders while loading -->
      <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-line w60"></div><div class="skeleton-line w40"></div><div class="skeleton-line w100"></div></div>
      <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-line w60"></div><div class="skeleton-line w40"></div><div class="skeleton-line w100"></div></div>
      <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-line w60"></div><div class="skeleton-line w40"></div><div class="skeleton-line w100"></div></div>
      <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-line w60"></div><div class="skeleton-line w40"></div><div class="skeleton-line w100"></div></div>
    </div>

    <!-- Empty state (hidden until needed) -->
    <div class="empty-state" id="emptyState" hidden>
      <div class="empty-icon" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
          <line x1="3" x2="21" y1="6" y2="6"/>
          <path d="M16 10a4 4 0 0 1-8 0"/>
        </svg>
      </div>
      <h3>No products found</h3>
      <p>We couldn't find any products matching your selected filter.</p>
      <button class="btn-primary" id="clearFiltersBtn" role="button" tabindex="0">Clear Filters</button>
    </div>
  </main>

  <!-- PRODUCT DETAIL MODAL -->
  <div class="modal-overlay" id="modalOverlay" hidden aria-modal="true" role="dialog" aria-label="Product details">
    <div class="modal" id="modal">
      <button class="modal-close" id="modalClose" aria-label="Close product details">&times;</button>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
